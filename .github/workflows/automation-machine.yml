name: Beast Machine - Perfect Final Fix

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ouroboros_trigger]

concurrency:
  group: beast-machine-lock

jobs:
  beast-loop:
    runs-on: ubuntu-latest

    steps:
      - name: "১. জাভা ২১ ইনস্টল (Adoptium)"
        run: |
          wget -qO - https://packages.adoptium.net/artifactory/api/gpg/key/public | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/adoptium.gpg > /dev/null
          echo "deb https://packages.adoptium.net/artifactory/deb $(awk -F= '/^VERSION_CODENAME/{print $2}' /etc/os-release) main" | sudo tee /etc/apt/sources.list.d/adoptium.list
          sudo apt update -y && sudo apt install temurin-21-jre -y
          sudo update-alternatives --set java /usr/lib/jvm/temurin-21-jre-amd64/bin/java
          java -version

      - name: "২. Rclone নিরাপদ ইনজেকশন (No Escape Required)"
        env:
          RCLONE_CONF_DATA: ${{ secrets.RCLONE_CONFIG }}
        run: |
          curl https://rclone.org/install.sh | sudo bash
          sudo mkdir -p /root/.config/rclone
          # এনভায়রনমেন্ট ভেরিয়েবল ব্যবহার করে সরাসরি ফাইল রাইট করা
          echo "$RCLONE_CONF_DATA" | sudo tee /root/.config/rclone/rclone.conf > /dev/null
          sudo chmod 600 /root/.config/rclone/rclone.conf
          echo "Rclone কনফিগ সফলভাবে ইনজেক্ট হয়েছে!"

      - name: "৩. SSH ও পাসওয়ার্ড ফিক্স (User: root | Pass: root)"
        run: |
          # পাসওয়ার্ড 'root' সেট করা
          echo "root:root" | sudo chpasswd
          
          # SSH কনফিগারেশন নিখুঁতভাবে সেট করা যাতে Terminus পাসওয়ার্ড নেয়
          sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?KbdInteractiveAuthentication.*/KbdInteractiveAuthentication yes/' /etc/ssh/sshd_config
          
          # টেলস্কেল কানেক্ট
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=beast-machine
          
          # সার্ভিস রিস্টার্ট
          sudo systemctl restart ssh
          echo "SSH পাসওয়ার্ড অথেন্টিকেশন এখন এনাবলড!"

      - name: "৪. ৫ মিনিটের লাইভ টেস্টিং"
        run: |
          echo "ওস্তাদ, এবার Terminus এ root/root দিয়ে ট্রাই করুন"
          echo "ড্রাইভ চেক করতে লিখুন: rclone lsd gdrive:"
          sleep 300 

      - name: "৫. লুপ ট্রিগার"
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "ouroboros_trigger"}'
            
