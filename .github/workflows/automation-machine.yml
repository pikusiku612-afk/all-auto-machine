name: Beast Machine - Safe Sync & Pro Logging

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ouroboros_trigger]

concurrency:
  group: beast-machine-lock

jobs:
  beast-loop:
    runs-on: ubuntu-latest

    steps:
      - name: "১. জাভা ২১ ও বেসিক সেটআপ"
        run: |
          wget -qO - https://packages.adoptium.net/artifactory/api/gpg/key/public | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/adoptium.gpg > /dev/null
          echo "deb https://packages.adoptium.net/artifactory/deb $(awk -F= '/^VERSION_CODENAME/{print $2}' /etc/os-release) main" | sudo tee /etc/apt/sources.list.d/adoptium.list
          sudo apt update -y && sudo apt install temurin-21-jre -y
          sudo update-alternatives --set java /usr/lib/jvm/temurin-21-jre-amd64/bin/java

      - name: "২. Rclone ও Playit কনফিগারেশন"
        env:
          RCLONE_CONF_DATA: ${{ secrets.RCLONE_CONFIG }}
          PLAYIT_CONF_DATA: ${{ secrets.PLAYIT_CONFIG }}
        run: |
          curl https://rclone.org/install.sh | sudo bash
          sudo mkdir -p /root/.config/rclone
          echo "$RCLONE_CONF_DATA" | sudo tee /root/.config/rclone/rclone.conf > /dev/null
          
          sudo wget -q -O /root/playit https://github.com/playit-cloud/playit-agent/releases/download/v0.16.5/playit-linux-amd64
          sudo chmod +x /root/playit
          sudo mkdir -p /root/.config/playit_gg
          echo "$PLAYIT_CONF_DATA" | sudo tee /root/.config/playit_gg/playit.toml > /dev/null
          sudo bash -c "nohup /root/playit --secret_path /root/.config/playit_gg/playit.toml > /root/playit.log 2>&1 &"

      - name: "৩. SSH ও Tailscale (সবার আগে এক্সেস)"
        run: |
          echo "root:root" | sudo chpasswd
          sudo sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?KbdInteractiveAuthentication.*/KbdInteractiveAuthentication yes/' /etc/ssh/sshd_config
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=beast-machine
          sudo systemctl restart ssh

      - name: "৪. অটো-সিঙ্ক স্ক্রিপ্ট (Wait for Flag & Pro Logging)"
        run: |
          # 'EOF' ব্যবহার করার কারণে ভেতরের কোড একদম হুবহু সেভ হবে
          sudo bash -c "cat << 'EOF' > /root/sync.sh
          #!/bin/bash
          
          LOG_FILE=\"/root/sync.log\"
          FLAG_FILE=\"/root/ready.txt\"

          # ডাউনলোড ১০০% শেষ না হওয়া পর্যন্ত অপেক্ষা করবে (Green Signal)
          while [ ! -f \"\$FLAG_FILE\" ]; do
            sleep 10
          done

          # আপনার দেওয়া জোস লগ আর্কিটেকচার
          echo \"=========================================\" >> \"\$LOG_FILE\"
          echo \"🚀 Background Sync Auto-Started at \$(date '+%Y-%m-%d %H:%M:%S')\" >> \"\$LOG_FILE\"
          echo \"=========================================\" >> \"\$LOG_FILE\"

          while true; do
            if [ \"\$(ls -A /mnt/ramdisk)\" ]; then
              echo \"[\$(date '+%Y-%m-%d %H:%M:%S')] 🔄 Sync Started: Copying RAM Disk to Google Drive...\" >> \"\$LOG_FILE\"
              rclone sync /mnt/ramdisk gdrive:MC_Data --transfers=16 --checkers=16 --drive-chunk-size=128M --buffer-size=256M --fast-list --use-mmap
              echo \"[\$(date '+%Y-%m-%d %H:%M:%S')] ✅ Sync Completed successfully.\" >> \"\$LOG_FILE\"
              echo \"-----------------------------------------\" >> \"\$LOG_FILE\"
            else
              echo \"[\$(date '+%Y-%m-%d %H:%M:%S')] ⚠️ ALERT: RAM Disk is EMPTY! Sync aborted.\" >> \"\$LOG_FILE\"
              echo \"-----------------------------------------\" >> \"\$LOG_FILE\"
            fi
            sleep 60
          done
          EOF"
          sudo chmod +x /root/sync.sh
          sudo nohup /root/sync.sh > /dev/null 2>&1 &

      - name: "৫. ডেটা ডাউনলোড শুরু (SSD Mode with Success Flag)"
        run: |
          sudo mkdir -p /mnt/ramdisk
          sudo bash -c "nohup rclone copy gdrive:MC_Data /mnt/ramdisk --transfers=128 --checkers=128 --multi-thread-streams=16 --drive-chunk-size=256M --buffer-size=1G --fast-list --use-mmap --drive-acknowledge-abuse -P --stats-one-line -v > /root/copy.log 2>&1 && touch /root/ready.txt &"
          echo "৩ জিবি ডেটা কপি শুরু হয়েছে। প্রগ্রেস দেখতে: tail -f /root/copy.log"

      - name: "৬. ১ ঘণ্টার লাইভ উইন্ডো ও ফাইনাল সিঙ্ক"
        run: |
          sleep 3540 
          echo "মেশিন বন্ধ হওয়ার আগে শেষবারের মতো সিঙ্ক হচ্ছে..."
          sudo rclone sync /mnt/ramdisk gdrive:MC_Data --transfers=16 --checkers=16 --drive-chunk-size=128M --buffer-size=256M --fast-list --use-mmap
          sleep 60

      - name: "৭. ওরোবোরোস লুপ ট্রিগার"
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "ouroboros_trigger"}'
            
