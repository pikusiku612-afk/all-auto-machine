name: Foundation Beast Machine (Fixed Path & Java)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ouroboros_trigger]

concurrency:
  group: beast-machine-lock

jobs:
  beast-loop:
    runs-on: ubuntu-latest

    steps:
      - name: "১. Adoptium Java 21 ইনস্টল ও ফোর্স সেট"
        run: |
          wget -qO - https://packages.adoptium.net/artifactory/api/gpg/key/public | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/adoptium.gpg > /dev/null
          echo "deb https://packages.adoptium.net/artifactory/deb $(awk -F= '/^VERSION_CODENAME/{print $2}' /etc/os-release) main" | sudo tee /etc/apt/sources.list.d/adoptium.list
          sudo apt update -y
          sudo apt install temurin-21-jre -y
          
          # জাদুকরী লাইন: সিস্টেমকে বাধ্য করা হচ্ছে জাভা ২১ ব্যবহার করতে
          sudo update-alternatives --set java /usr/lib/jvm/temurin-21-jre-amd64/bin/java
          java -version

      - name: "২. Rclone ইনস্টল ও Root কনফিগ সেটআপ"
        run: |
          curl https://rclone.org/install.sh | sudo bash
          # এবার সরাসরি root এর ফোল্ডারে ফাইলটি বসাচ্ছি
          sudo mkdir -p /root/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" | sudo tee /root/.config/rclone/rclone.conf > /dev/null
          sudo chmod 600 /root/.config/rclone/rclone.conf
          echo "Rclone কনফিগ সরাসরি /root/.config/rclone এ সেভ করা হয়েছে!"

      - name: "৩. Tailscale ও SSH (Root Access)"
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=beast-machine
          echo "root:root" | sudo chpasswd
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/g' /etc/ssh/sshd_config
          echo "PermitRootLogin yes" | sudo tee -a /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: "৪. ৫ মিনিটের ভেরিফিকেশন রান"
        run: |
          echo "টার্মিনাস দিয়ে ঢুকুন এবং নিচের কমান্ডগুলো চেক করুন:"
          echo "১. java -version (২১ দেখাবে)"
          echo "২. ls -a /root/.config/rclone (ফাইলটি দেখাবে)"
          echo "৩. rclone lsd gdrive: (ড্রাইভের ফোল্ডার দেখাবে)"
          sleep 300 

      - name: "৫. ওরোবোরোস লুপ ট্রিগার"
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "ouroboros_trigger"}'
            
