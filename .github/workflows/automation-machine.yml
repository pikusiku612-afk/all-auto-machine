name: Foundation Beast Machine (5-Min Test)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ouroboros_trigger]

# ট্রাফিক পুলিশ (একের অধিক মেশিন চলতে দেবে না)
concurrency:
  group: beast-machine-lock

jobs:
  beast-loop:
    runs-on: ubuntu-latest

    steps:
      - name: "১. Adoptium Java 21 ইনস্টল"
        run: |
          wget -qO - https://packages.adoptium.net/artifactory/api/gpg/key/public | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/adoptium.gpg > /dev/null
          echo "deb https://packages.adoptium.net/artifactory/deb $(awk -F= '/^VERSION_CODENAME/{print $2}' /etc/os-release) main" | sudo tee /etc/apt/sources.list.d/adoptium.list
          sudo apt update -y
          sudo apt install temurin-21-jre -y

      - name: "২. Rclone ইনস্টল ও কনফিগ"
        run: |
          echo "Rclone ইনস্টল করা হচ্ছে..."
          curl https://rclone.org/install.sh | sudo bash
          echo "Rclone কনফিগ সেটআপ করা হচ্ছে..."
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf

      - name: "৩. Tailscale কানেক্ট (Hostname: beast-machine)"
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=beast-machine

      - name: "৪. SSH Root Access (User: root, Pass: root)"
        run: |
          echo "root:root" | sudo chpasswd
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/g' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/g' /etc/ssh/sshd_config
          sudo sed -i 's/PermitRootLogin prohibit-password/PermitRootLogin yes/g' /etc/ssh/sshd_config
          echo "PermitRootLogin yes" | sudo tee -a /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: "৫. ৫ মিনিটের টেস্ট রান"
        run: |
          echo "ওস্তাদ, মেশিন রেডি! টার্মিনাস দিয়ে ঢুকে Java 21 এবং Rclone চেক করুন।"
          sleep 300 

      - name: "৬. ওরোবোরোস ট্রিগার (পরবর্তী মেশিনের জন্ম)"
        run: |
          echo "নতুন মেশিনকে ডাকা হচ্ছে..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type": "ouroboros_trigger"}'
            
